<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Oréal — Parce qu'elle le valait déjà</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #c8102e;
  --pw: 580px;
  --ph: 326px;
  --ease: cubic-bezier(0.77, 0, 0.175, 1);
}
html, body {
  width: 100%; height: 100%; overflow: hidden; background: #0d0d0d;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; -webkit-user-select: none; user-select: none;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 55%, rgba(200,16,46,0.07), transparent);
  pointer-events: none;
}
#pdf-overlay {
  position: fixed; inset: 0; z-index: 999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0d0d0d;
  transition: opacity 0.8s var(--ease), transform 0.8s var(--ease);
}
#pdf-overlay.dissolve { opacity: 0; transform: scale(1.03); pointer-events: none; }
.overlay-brand {
  font-family: 'Playfair Display', serif; font-size: 10px;
  letter-spacing: 0.5em; text-transform: uppercase;
  color: rgba(255,255,255,0.18); margin-bottom: 52px;
}
.progress-wrap {
  width: 340px; margin-top: 28px; opacity: 0;
  transition: opacity 0.3s; pointer-events: none;
}
.progress-wrap.visible { opacity: 1; }
.progress-track { width: 100%; height: 1px; background: rgba(255,255,255,0.08); position: relative; }
.progress-fill {
  position: absolute; left: 0; top: 0; height: 100%;
  background: linear-gradient(to right, rgba(200,16,46,0.5), var(--red));
  width: 0%; transition: width 0.15s linear;
}
.progress-text {
  margin-top: 10px; font-size: 10px; letter-spacing: 0.3em;
  text-transform: uppercase; color: rgba(255,255,255,0.22); text-align: center;
}
.progress-error {
  margin-top: 10px; font-size: 11px; letter-spacing: 0.12em;
  color: rgba(200,16,46,0.7); text-align: center; font-style: italic;
}
.brand {
  position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
  font-family: 'Playfair Display', serif; font-size: 10px; letter-spacing: 0.5em;
  text-transform: uppercase; color: rgba(255,255,255,0); white-space: nowrap;
  transition: color 0.7s; z-index: 100;
}
body.ui-on .brand { color: rgba(255,255,255,0.2); }
.book-outer {
  width: var(--pw); height: var(--ph); overflow: hidden; position: relative;
  opacity: 0; transition: width 0.85s var(--ease), opacity 0.6s ease; will-change: width;
}
body.book-ready .book-outer { opacity: 1; }
body.opened .book-outer { width: calc(var(--pw) * 2); }
.scene {
  width: calc(var(--pw) * 2); height: var(--ph);
  perspective: 2600px; perspective-origin: 50% 45%;
  transform: translateX(calc(-1 * var(--pw)));
  transition: transform 0.85s var(--ease); will-change: transform;
}
body.opened .scene { transform: translateX(0); }
.book { width: calc(var(--pw) * 2); height: var(--ph); position: relative; transform-style: preserve-3d; }
.page { position: absolute; top: 0; width: var(--pw); height: var(--ph); overflow: hidden; background: #1a1a1a; }
.page.left  { left: 0; border-radius: 3px 0 0 3px; }
.page.right { left: var(--pw); border-radius: 0 3px 3px 0; }
.page img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
.page-blank { width: 100%; height: 100%; background: linear-gradient(135deg, #1d1d1d, #161616); display: flex; align-items: center; justify-content: center; }
.page-blank-inner { width: 32px; height: 32px; border: 1px solid rgba(200,16,46,0.12); border-radius: 50%; }
.spine {
  position: absolute; left: 50%; transform: translateX(-50%);
  top: 0; bottom: 0; width: 4px; z-index: 30; pointer-events: none;
  background: linear-gradient(90deg, rgba(0,0,0,0.6), rgba(255,255,255,0.04) 30%, rgba(200,16,46,0.18) 50%, rgba(255,255,255,0.04) 70%, rgba(0,0,0,0.6));
  opacity: 0; transition: opacity 0.5s ease 0.3s;
}
body.opened .spine { opacity: 1; }
.book-shadow {
  position: absolute; bottom: -18px; left: 20px; right: 20px; height: 26px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.65) 0%, transparent 70%);
  filter: blur(7px); pointer-events: none;
}
.cast-shadow { position: absolute; top: 0; bottom: 0; width: 60px; pointer-events: none; z-index: 5; opacity: 0; }
.cast-shadow.left-shadow  { left: var(--pw);  background: linear-gradient(to right, rgba(0,0,0,0.45), transparent); }
.cast-shadow.right-shadow { right: var(--pw); background: linear-gradient(to left,  rgba(0,0,0,0.45), transparent); }
.flipper { position: absolute; top: 0; height: var(--ph); width: var(--pw); transform-style: preserve-3d; pointer-events: none; will-change: transform; }
.flipper.fwd { left: var(--pw); transform-origin: left center; }
.flipper.bwd { left: 0; transform-origin: right center; }
.flipper-face { position: absolute; inset: 0; overflow: hidden; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
.flipper-face img { width: 100%; height: 100%; object-fit: cover; display: block; }
.flipper-face.back { transform: rotateY(180deg); }
.flipper-face.front::after, .flipper-face.back::after { content: ''; position: absolute; inset: 0; pointer-events: none; }
.flipper.fwd .flipper-face.front::after { background: linear-gradient(to left,  rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.07) 35%, transparent 65%); }
.flipper.fwd .flipper-face.back::after  { background: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.07) 35%, transparent 65%); }
.flipper.bwd .flipper-face.front::after { background: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.07) 35%, transparent 65%); }
.flipper.bwd .flipper-face.back::after  { background: linear-gradient(to left,  rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.07) 35%, transparent 65%); }
.corner-hotspot { position: absolute; width: 80px; height: 80px; z-index: 20; cursor: grab; }
.corner-hotspot:active { cursor: grabbing; }
.corner-hotspot.right-corner { bottom: 0; right: 0; }
.corner-hotspot.left-corner  { bottom: 0; left: 0; }
.corner-hotspot::before { content: ''; position: absolute; bottom: 0; width: 0; height: 0; transition: border-width 0.22s; filter: drop-shadow(0 -2px 5px rgba(0,0,0,0.5)); }
.corner-hotspot.right-corner::before { right: 0; border-style: solid; border-color: transparent transparent rgba(32,32,32,0.97) transparent; border-width: 0; }
.corner-hotspot.left-corner::before  { left: 0;  border-style: solid; border-color: transparent rgba(32,32,32,0.97) transparent transparent; border-width: 0; }
.corner-hotspot.right-corner:hover::before { border-width: 0 0 52px 52px; }
.corner-hotspot.left-corner:hover::before  { border-width: 0 52px 52px 0; }
.corner-hotspot::after { content: ''; position: absolute; bottom: 10px; width: 11px; height: 11px; opacity: 0; transition: opacity 0.2s; }
.corner-hotspot.right-corner::after { right: 10px; border-right: 1.5px solid rgba(200,16,46,0.85); border-bottom: 1.5px solid rgba(200,16,46,0.85); transform: rotate(-45deg); }
.corner-hotspot.left-corner::after  { left: 10px;  border-left:  1.5px solid rgba(200,16,46,0.85); border-bottom: 1.5px solid rgba(200,16,46,0.85); transform: rotate(45deg); }
.corner-hotspot:hover::after { opacity: 1; }
.open-cta {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  cursor: pointer; z-index: 200; opacity: 0; transition: opacity 0.35s; pointer-events: none;
}
body.book-ready .open-cta { opacity: 1; pointer-events: auto; }
.open-cta.gone { opacity: 0 !important; pointer-events: none !important; }
.open-cta-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; letter-spacing: 0.18em; color: rgba(255,255,255,0.42); }
.open-cta-line { width: 1px; height: 28px; background: linear-gradient(to bottom, rgba(200,16,46,0.7), transparent); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:.4; transform:scaleY(.9); } 50% { opacity:1; transform:scaleY(1.15); } }
.controls {
  display: flex; align-items: center; gap: 28px; margin-top: 26px;
  opacity: 0; transform: translateY(6px); transition: opacity 0.7s, transform 0.7s; pointer-events: none;
}
body.ui-on .controls { opacity: 1; transform: translateY(0); pointer-events: auto; }
.ctrl-btn {
  background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4);
  width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .2s, color .2s, background .2s; font-size: 14px;
}
.ctrl-btn:hover:not(:disabled) { border-color: var(--red); color: #fff; background: rgba(200,16,46,0.1); }
.ctrl-btn:disabled { opacity: 0.18; cursor: not-allowed; }
.spread-info { font-size: 12px; letter-spacing: 0.2em; color: rgba(255,255,255,0.22); min-width: 52px; text-align: center; }
.dots { display: flex; gap: 7px; margin-top: 14px; opacity: 0; transition: opacity 0.7s 0.1s; }
body.ui-on .dots { opacity: 1; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.12); cursor: pointer; transition: all 0.25s; }
.dot.on { background: var(--red); transform: scale(1.5); }
.hint {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase;
  color: rgba(255,255,255,0); white-space: nowrap; transition: color 0.7s 0.2s;
}
body.ui-on .hint { color: rgba(255,255,255,0.11); }
@media (max-width:1260px) { :root { --pw:440px; --ph:247px; } }
@media (max-width:950px)  { :root { --pw:340px; --ph:191px; } }
@media (max-width:720px)  { :root { --pw:250px; --ph:140px; } .corner-hotspot { width:50px; height:50px; } }
</style>
</head>
<body>

<div id="pdf-overlay">
  <p class="overlay-brand">L'Oréal Paris · Parce qu'elle le valait déjà</p>
  <div class="progress-wrap visible" id="progressWrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <p class="progress-text" id="progressText">Chargement…</p>
    <p class="progress-error" id="progressError"></p>
  </div>
</div>

<div class="brand">L'Oréal Paris · Parce qu'elle le valait déjà</div>
<div class="book-outer">
  <div class="scene" id="scene">
    <div class="book" id="book">
      <div class="page left"  id="pLeft"></div>
      <div class="page right" id="pRight"></div>
      <div class="spine"></div>
      <div class="cast-shadow left-shadow"  id="castL"></div>
      <div class="cast-shadow right-shadow" id="castR"></div>
    </div>
    <div class="book-shadow"></div>
  </div>
</div>
<div class="controls">
  <button class="ctrl-btn" id="btnPrev">&#8592;</button>
  <span class="spread-info" id="sInfo"></span>
  <button class="ctrl-btn" id="btnNext">&#8594;</button>
</div>
<div class="dots" id="dotsEl"></div>
<div class="open-cta" id="openCta">
  <span class="open-cta-text">Ouvrir le livre</span>
  <div class="open-cta-line"></div>
</div>
<p class="hint">Glisser le bord des pages · ← →</p>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const progressWrap  = document.getElementById('progressWrap');
const progressFill  = document.getElementById('progressFill');
const progressText  = document.getElementById('progressText');
const progressError = document.getElementById('progressError');
const pdfOverlay    = document.getElementById('pdf-overlay');

const RENDER_SCALE = 2.0;

// ← change juste ce nom si ton fichier s'appelle autrement
const PDF_FILE = 'sarah.pdf';

async function autoLoadPDF() {
  progressText.textContent = 'Chargement de ' + PDF_FILE + '…';
  try {
    const response = await fetch(PDF_FILE);
    if (!response.ok) throw new Error('Fichier introuvable : ' + PDF_FILE);
    const arrayBuffer = await response.arrayBuffer();
    await processPDF(arrayBuffer);
  } catch (err) { showError(err.message); }
}
autoLoadPDF();

function showError(msg) {
  progressText.textContent = '';
  progressError.textContent = msg;
}

async function processPDF(arrayBuffer) {
  progressError.textContent = '';
  progressFill.style.width = '0%';
  try {
    progressText.textContent = 'Analyse du PDF…';
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const totalPages = pdf.numPages;
    const pages = [];
    const offscreen = document.createElement('canvas');
    const ctx = offscreen.getContext('2d');
    for (let i = 1; i <= totalPages; i++) {
      progressText.textContent = `Rendu de la page ${i} / ${totalPages}…`;
      progressFill.style.width = ((i - 1) / totalPages * 100) + '%';
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: RENDER_SCALE });
      offscreen.width  = viewport.width;
      offscreen.height = viewport.height;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, offscreen.width, offscreen.height);
      await page.render({ canvasContext: ctx, viewport }).promise;
      pages.push(offscreen.toDataURL('image/jpeg', 0.92));
    }
    progressFill.style.width = '100%';
    progressText.textContent = 'Ouverture du livre…';
    await new Promise(r => setTimeout(r, 400));
    initBook(pages);
    pdfOverlay.classList.add('dissolve');
    setTimeout(() => { pdfOverlay.style.display = 'none'; }, 900);
    document.body.classList.add('book-ready');
  } catch (err) {
    console.error(err);
    showError('Erreur : ' + err.message);
  }
}

let PAGES = [], SPREADS = [], cur = 0, flipping = false, flipper = null, opened = false;
const pLeft = document.getElementById('pLeft');
const pRight = document.getElementById('pRight');
const castL = document.getElementById('castL');
const castR = document.getElementById('castR');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const sInfo = document.getElementById('sInfo');
const dotsEl = document.getElementById('dotsEl');
const openCta = document.getElementById('openCta');

function buildSpreads(ps) {
  const s = [[null, ps[0]]];
  for (let i = 1; i < ps.length - 1; i += 2) s.push([ps[i], ps[i+1] || null]);
  if (ps.length % 2 === 0) s.push([ps[ps.length-1], null]);
  return s;
}
function initBook(pages) {
  PAGES = pages; SPREADS = buildSpreads(PAGES);
  cur = 0; flipping = false; flipper = null; opened = false;
  dotsEl.innerHTML = '';
  SPREADS.forEach((_, i) => {
    const d = document.createElement('div'); d.className = 'dot';
    d.addEventListener('click', () => jumpTo(i)); dotsEl.appendChild(d);
  });
  openCta.classList.remove('gone');
  pRight.onclick = () => { if (!opened) openBook(); };
  openCta.onclick = openBook;
  showCover();
}
function pageEl(src) {
  if (!src) { const d = document.createElement('div'); d.className = 'page-blank'; d.innerHTML = '<div class="page-blank-inner"></div>'; return d; }
  const img = document.createElement('img'); img.src = src; img.alt = ''; return img;
}
function updateUI(idx) {
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === SPREADS.length - 1;
  sInfo.textContent = (idx + 1) + ' / ' + SPREADS.length;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === idx));
  castL.style.opacity = castR.style.opacity = '0';
}
function showCover() {
  pRight.innerHTML = ''; pRight.appendChild(pageEl(PAGES[0]));
  pLeft.innerHTML  = ''; pLeft.appendChild(pageEl(null));
  updateUI(0);
}
function renderSpread(idx) {
  const [l, r] = SPREADS[idx];
  pLeft.innerHTML  = ''; pLeft.appendChild(pageEl(l));
  pRight.innerHTML = ''; pRight.appendChild(pageEl(r));
  updateUI(idx); addHotspots();
}
function addHotspots() {
  document.querySelectorAll('.corner-hotspot').forEach(h => h.remove());
  pLeft.onclick = pRight.onclick = null;
  if (!opened) return;
  if (cur < SPREADS.length - 1) {
    const h = document.createElement('div'); h.className = 'corner-hotspot right-corner';
    pRight.appendChild(h);
    h.addEventListener('mousedown', e => startDrag(e, 'fwd'));
    h.addEventListener('touchstart', e => startDrag(e.touches[0], 'fwd'), {passive:true});
    pRight.onclick = () => { if (!flipping) animFlip('fwd', cur + 1); };
  }
  if (cur > 0) {
    const h = document.createElement('div'); h.className = 'corner-hotspot left-corner';
    pLeft.appendChild(h);
    h.addEventListener('mousedown', e => startDrag(e, 'bwd'));
    h.addEventListener('touchstart', e => startDrag(e.touches[0], 'bwd'), {passive:true});
    pLeft.onclick = () => { if (!flipping) animFlip('bwd', cur - 1); };
  }
}
function mkFlipper(dir) {
  const f = document.createElement('div'); f.className = 'flipper ' + dir;
  f.innerHTML = '<div class="flipper-face front"></div><div class="flipper-face back"></div>';
  document.getElementById('book').appendChild(f); return f;
}
function setAngle(f, dir, deg) {
  f.style.transform = dir === 'fwd' ? `rotateY(${-deg}deg)` : `rotateY(${deg}deg)`;
  const s = Math.sin((deg / 180) * Math.PI) * 0.65;
  if (dir === 'fwd') castL.style.opacity = String(s); else castR.style.opacity = String(s);
}
function removeFlipper() { if (flipper) { flipper.remove(); flipper = null; } }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function openBook() {
  if (opened) return; opened = true;
  openCta.classList.add('gone');
  document.body.classList.add('opened');
  cur = 0;
  animFlip('fwd', 1, 0, () => { document.body.classList.add('ui-on'); });
}
function closeBook() {
  document.body.classList.remove('ui-on');
  document.querySelectorAll('.corner-hotspot').forEach(h => h.remove());
  pLeft.onclick = pRight.onclick = null;
  animFlip('bwd', 0, 0, () => {
    opened = false; document.body.classList.remove('opened');
    setTimeout(() => openCta.classList.remove('gone'), 600);
  });
}
function loadFlipper(f, dir, ti) {
  const [cL, cR] = SPREADS[cur]; const [nL, nR] = SPREADS[ti];
  const front = f.querySelector('.front'); const back = f.querySelector('.back');
  if (dir === 'fwd') {
    front.appendChild(pageEl(cR)); back.appendChild(pageEl(nL));
    pLeft.innerHTML = ''; pLeft.appendChild(pageEl(cL));
    pRight.innerHTML = ''; pRight.appendChild(pageEl(nR));
  } else {
    front.appendChild(pageEl(cL)); back.appendChild(pageEl(nR));
    pLeft.innerHTML = ''; pLeft.appendChild(pageEl(nL));
    pRight.innerHTML = ''; pRight.appendChild(pageEl(cR));
  }
}
function animFlip(dir, ti, from = 0, onDone = null) {
  if (flipping) return;
  if (ti === 0 && dir === 'bwd' && opened && !onDone) { closeBook(); return; }
  if (ti < 0 || ti >= SPREADS.length) return;
  flipping = true; removeFlipper();
  flipper = mkFlipper(dir); loadFlipper(flipper, dir, ti); setAngle(flipper, dir, from);
  const dur = onDone ? 850 : 560; const t0 = performance.now();
  (function step(now) {
    const p = Math.min((now - t0) / dur, 1);
    setAngle(flipper, dir, from + (180 - from) * easeInOut(p));
    if (p < 1) { requestAnimationFrame(step); return; }
    removeFlipper(); cur = ti; renderSpread(cur); flipping = false;
    if (onDone) onDone();
  })(performance.now());
}
function snapBack(dir, from) {
  if (!flipper) return; flipping = true;
  const dur = 360, t0 = performance.now();
  (function step(now) {
    const p = Math.min((now - t0) / dur, 1);
    setAngle(flipper, dir, from * (1 - easeInOut(p)));
    if (p < 1) { requestAnimationFrame(step); return; }
    removeFlipper(); renderSpread(cur); flipping = false;
  })(performance.now());
}
let drag = null;
function startDrag(e, dir) {
  if (flipping || !opened) return;
  const ti = dir === 'fwd' ? cur + 1 : cur - 1;
  if (ti < 0 || ti >= SPREADS.length) return;
  removeFlipper(); flipper = mkFlipper(dir);
  loadFlipper(flipper, dir, ti); setAngle(flipper, dir, 0);
  const bw = document.getElementById('book').getBoundingClientRect().width / 2;
  drag = { dir, ti, startX: e.clientX, bw, angle: 0 };
  const mv = ev => {
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const dx = drag.dir === 'fwd' ? drag.startX - cx : cx - drag.startX;
    drag.angle = Math.max(0, Math.min(178, (dx / drag.bw) * 180));
    setAngle(flipper, drag.dir, drag.angle);
  };
  const up = () => {
    document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up);
    document.removeEventListener('touchmove', mv); document.removeEventListener('touchend', up);
    if (!drag) return;
    const { dir: d, ti: t, angle: a } = drag; drag = null;
    if (a > 55) animFlip(d, t, a); else snapBack(d, a);
  };
  document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up);
  document.addEventListener('touchmove', mv, {passive:true}); document.addEventListener('touchend', up);
}
function jumpTo(idx) {
  if (idx === cur || flipping) return;
  if (!opened && idx > 0) { openBook(); return; }
  animFlip(idx > cur ? 'fwd' : 'bwd', idx);
}
document.addEventListener('keydown', e => {
  if (!opened) { if (e.key === 'Enter' || e.key === ' ') openBook(); return; }
  if (e.key === 'ArrowRight') animFlip('fwd', cur + 1);
  if (e.key === 'ArrowLeft')  animFlip('bwd', cur - 1);
});
btnNext.addEventListener('click', () => animFlip('fwd', cur + 1));
btnPrev.addEventListener('click', () => animFlip('bwd', cur - 1));
</script>
</body>
</html>
